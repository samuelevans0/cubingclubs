<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password — CubingClubs.net</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1A56DB" />
<link rel="icon" href="/logo.png" type="image/png" />
<link rel="apple-touch-icon" href="/logo.png" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #1A56DB; --brand-dark: #1240A8; --brand-light: #EBF1FD;
    --bg: #F6F7F9; --surface: #FFFFFF; --border: #E4E7EC;
    --text: #111827; --text-2: #4B5563; --text-3: #9CA3AF;
    --success: #16A34A; --success-light: #DCFCE7;
    --danger: #DC2626; --danger-light: #FEE2E2;
    --radius: 10px; --header-h: 68px;
  }
  html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
  header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 2rem; gap: 2rem; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-img { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .logo-text span { color: var(--brand); }
  .page { max-width: 400px; margin: 6rem auto; padding: 0 1.5rem; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
  .auth-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .auth-sub { font-size: 13px; color: var(--text-3); margin-bottom: 1.5rem; line-height: 1.5; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
  label { font-size: 13px; font-weight: 500; color: var(--text-2); }
  input { font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; transition: border 0.15s, box-shadow 0.15s; width: 100%; }
  input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
  .error-msg { font-size: 13px; color: var(--danger); background: var(--danger-light); padding: 8px 12px; border-radius: 8px; margin-bottom: 1rem; display: none; }
  .error-msg.visible { display: block; }
  .success-card { background: var(--success-light); border: 1px solid #86efac; border-radius: var(--radius); padding: 1.5rem; text-align: center; display: none; }
  .success-card.visible { display: block; }
  .success-card h2 { font-size: 18px; color: var(--success); margin-bottom: 6px; }
  .success-card p { font-size: 14px; color: #166534; }
  .btn-primary { display: flex; align-items: center; justify-content: center; width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 10px 16px; border-radius: 8px; border: none; background: var(--brand); color: #fff; cursor: pointer; transition: background 0.15s; }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .auth-switch { font-size: 13px; color: var(--text-3); text-align: center; margin-top: 1.25rem; }
  .auth-switch a { color: var(--brand); text-decoration: none; font-weight: 500; }
  .cf-turnstile { margin-bottom: 1rem; }
</style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <img src="/logo.png" class="logo-img" alt="CubingClubs.net" />
    <span class="logo-text">CubingClubs<span>.net</span></span>
  </a>
</header>

<div class="page">
  <div class="auth-card" id="form-card">
    <div class="auth-title">Forgot password?</div>
    <div class="auth-sub">Enter your email and we'll send a link to reset your password.</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <button class="btn-primary" id="submit-btn" onclick="doSubmit()">Send Reset Link</button>
    <div class="auth-switch"><a href="/dashboard">← Back to Log In</a></div>
  </div>

  <div class="success-card" id="success-card">
    <h2>Check your inbox</h2>
    <p>If an account with that email exists, we've sent a password reset link. It expires in 1 hour.</p>
  </div>
</div>

<script>
async function doSubmit() {
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('error-msg');
  const email = document.getElementById('email').value.trim();
  const tsToken = document.querySelector('[name="cf-turnstile-response"]')?.value || '';

  errEl.classList.remove('visible');
  if (!email) { errEl.textContent = 'Email is required.'; errEl.classList.add('visible'); return; }

  btn.disabled = true; btn.textContent = 'Sending…';

  try {
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, turnstile_token: tsToken })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Something went wrong.';
      errEl.classList.add('visible');
      btn.disabled = false; btn.textContent = 'Send Reset Link';
      if (typeof turnstile !== 'undefined') turnstile.reset();
      return;
    }
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('success-card').classList.add('visible');
  } catch {
    errEl.textContent = 'Network error. Please try again.';
    errEl.classList.add('visible');
    btn.disabled = false; btn.textContent = 'Send Reset Link';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doSubmit(); });
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
<footer style="background:var(--surface);border-top:1px solid var(--border);padding:0.75rem 2rem;font-size:12px;color:var(--text-3);">
  &copy; 2026 CubingClubs.net &mdash; <a href="/privacy-policy" style="color:var(--brand);text-decoration:none;">Privacy Policy</a>
</footer>
</body>
</html>
