<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Privacy Policy — CubingClubs.net</title>
<meta name="description" content="Privacy Policy for CubingClubs.net" />
<link rel="canonical" href="https://cubingclubs.net/privacy-policy" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1A56DB" />
<link rel="icon" href="/logo.png" type="image/png" />
<link rel="apple-touch-icon" href="/logo.png" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #1A56DB; --brand-dark: #1240A8; --brand-light: #EBF1FD;
    --bg: #F6F7F9; --surface: #FFFFFF; --border: #E4E7EC;
    --text: #111827; --text-2: #4B5563; --text-3: #9CA3AF;
    --radius: 10px; --header-h: 68px;
  }
  html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

  header {
    position: sticky; top: 0; z-index: 1000; height: var(--header-h);
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 2rem; gap: 2rem;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-img { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .logo-text span { color: var(--brand); }
  nav { display: flex; align-items: center; gap: 0.25rem; margin-left: auto; }
  nav a { font-size: 14px; font-weight: 500; color: var(--text-2); text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: background 0.15s, color 0.15s; }
  nav a:hover { background: var(--bg); color: var(--text); }
  .nav-divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .header-cta { background: var(--brand); color: #fff !important; border-radius: 7px; padding: 7px 16px !important; font-weight: 600 !important; margin-left: 0.25rem; transition: background 0.15s !important; }
  .header-cta:hover { background: var(--brand-dark) !important; }
  .header-cta-outline { border: 1px solid var(--border); color: var(--text) !important; border-radius: 7px; padding: 6px 14px !important; font-weight: 500 !important; margin-left: 0.25rem; }
  .header-cta-outline:hover { border-color: var(--brand); color: var(--brand) !important; background: var(--brand-light) !important; }

  .page-wrap { max-width: 720px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
  .page-title { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 0.35rem; }
  .page-updated { font-size: 13px; color: var(--text-3); margin-bottom: 2.5rem; }

  .policy-content {
    font-size: 15px; line-height: 1.75; color: var(--text-2);
    word-break: break-word;
  }
  .policy-content h1, .policy-content h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.15em; font-weight: 700; margin: 1.75rem 0 0.5rem; color: var(--text); }
  .policy-content h3 { font-size: 1em; font-weight: 600; margin: 1.25rem 0 0.4rem; color: var(--text); }
  .policy-content p { margin: 0.6rem 0; }
  .policy-content ul { margin: 0.5rem 0 0.5rem 1.5rem; }
  .policy-content li { margin-bottom: 0.4rem; }
  .policy-content a { color: var(--brand); }
  .policy-empty {
    text-align: center; padding: 4rem 1rem;
    font-size: 14px; color: var(--text-3);
  }

  footer { background: var(--surface); border-top: 1px solid var(--border); padding: 0.85rem 2rem; font-size: 13px; color: var(--text-3); display: flex; align-items: center; gap: 1rem; }
  footer a { color: var(--brand); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    header { padding: 0 1rem; }
    .page-wrap { padding: 2rem 1rem 3rem; }
    .page-title { font-size: 22px; }
    footer { padding: 0.65rem 1rem; font-size: 12px; }
  }
  @media (max-width: 400px) {
    .logo-text { display: none; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <img src="/logo.png" class="logo-img" alt="CubingClubs.net" />
    <span class="logo-text">CubingClubs<span>.net</span></span>
  </a>
  <nav id="main-nav">
    <a href="/">Clubs</a>
    <div class="nav-divider"></div>
    <a href="/dashboard" class="header-cta-outline">Log In</a>
    <a href="/signup" class="header-cta">Sign Up</a>
  </nav>
</header>

<main>
<div class="page-wrap">
  <div class="page-title">Privacy Policy</div>
  <div class="page-updated" id="page-updated"></div>
  <div id="policy-body"><div class="policy-empty">Loading&hellip;</div></div>
</div>
</main>

<footer>
  <span>&copy; 2026 CubingClubs.net &mdash; <a href="/privacy-policy">Privacy Policy</a></span>
</footer>

<script>
(async () => {
  try {
    const res = await fetch("/api/privacy-policy");
    const { content } = await res.json();
    const body = document.getElementById("policy-body");
    if (!content || !content.trim()) {
      body.innerHTML = '<div class="policy-empty">No privacy policy has been published yet.</div>';
    } else {
      body.innerHTML = `<div class="policy-content">${prepareContent(content)}</div>`;
      document.getElementById("page-updated").textContent =
        "Last updated: " + new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    }
  } catch {
    document.getElementById("policy-body").innerHTML =
      '<div class="policy-empty">Unable to load privacy policy.</div>';
  }
})();

async function initNav() {
  const nav = document.getElementById('main-nav');
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (res.ok) {
      const { user } = await res.json();
      if (user.is_admin) {
        nav.innerHTML = `<a href="/">Clubs</a><div class="nav-divider"></div><a href="/admin" class="header-cta-outline">Admin Dashboard</a><a href="#" class="header-cta" onclick="event.preventDefault();navLogout()">Log Out</a>`;
      } else {
        nav.innerHTML = `<a href="/">Clubs</a><div class="nav-divider"></div><a href="/dashboard" class="header-cta-outline">My Club</a><a href="#" class="header-cta" onclick="event.preventDefault();navLogout()">Log Out</a>`;
      }
      return;
    }
  } catch {}
  nav.innerHTML = `<a href="/">Clubs</a><div class="nav-divider"></div><a href="/dashboard" class="header-cta-outline">Log In</a><a href="/signup" class="header-cta">Sign Up</a>`;
}
async function navLogout() {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/';
}
initNav();

function prepareContent(html) {
  const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
  if (bodyMatch) html = bodyMatch[1];
  html = html.replace(/<style[\s\S]*?<\/style>/gi, '');
  html = html.replace(/<script[\s\S]*?<\/script>/gi, '');
  html = html.replace(/^\s*<h1[^>]*>[\s\S]*?<\/h1>/i, '');
  html = html.replace(/^\s*<p[^>]*class="last-updated"[^>]*>[\s\S]*?<\/p>/i, '');
  return html.trim();
}
</script>
</body>
</html>
