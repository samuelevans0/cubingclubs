<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verify Email — CubingClubs.net</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1A56DB" />
<link rel="icon" href="/logo.png" type="image/png" />
<link rel="apple-touch-icon" href="/logo.png" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #1A56DB; --brand-dark: #1240A8; --brand-light: #EBF1FD;
    --bg: #F6F7F9; --surface: #FFFFFF; --border: #E4E7EC;
    --text: #111827; --text-2: #4B5563; --text-3: #9CA3AF;
    --success: #16A34A; --success-light: #DCFCE7;
    --danger: #DC2626; --danger-light: #FEE2E2;
    --radius: 10px; --header-h: 68px;
  }
  html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
  header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 2rem; gap: 2rem; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-img { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .logo-text span { color: var(--brand); }
  .page { max-width: 440px; margin: 7rem auto; padding: 0 1.5rem; text-align: center; }
  .icon-circle { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
  .icon-circle.loading { background: var(--brand-light); }
  .icon-circle.success { background: var(--success-light); }
  .icon-circle.error { background: var(--danger-light); }
  h1 { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  p { font-size: 15px; color: var(--text-2); line-height: 1.6; margin-bottom: 1.5rem; }
  .btn { display: inline-block; background: var(--brand); color: #fff; text-decoration: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: background 0.15s; }
  .btn:hover { background: var(--brand-dark); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; }
</style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <img src="/logo.png" class="logo-img" alt="CubingClubs.net" />
    <span class="logo-text">CubingClubs<span>.net</span></span>
  </a>
</header>

<main>
<div class="page">
  <div class="icon-circle loading" id="icon">
    <div class="spinner"></div>
  </div>
  <h1 id="title">Verifying…</h1>
  <p id="msg">Please wait while we verify your email address.</p>
  <div id="action"></div>
</div>
</main>

<script>
async function verify() {
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  const isChange = params.get('change') === '1';

  if (!token) { showError('No token provided.'); return; }

  try {
    const endpoint = isChange
      ? `/api/auth/confirm-email-change?token=${encodeURIComponent(token)}`
      : `/api/auth/verify-email?token=${encodeURIComponent(token)}`;
    const res = await fetch(endpoint, { credentials: 'include' });
    const data = await res.json();

    if (!res.ok) { showError(data.error || 'Verification failed.'); return; }

    const icon = document.getElementById('icon');
    icon.className = 'icon-circle success';
    icon.innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
    document.getElementById('title').textContent = isChange ? 'Email updated!' : 'Email verified!';
    document.getElementById('msg').textContent = isChange
      ? `Your email has been changed to ${data.email || 'the new address'}.`
      : 'Your email address has been verified. You can now save your club listing.';
    document.getElementById('action').innerHTML = `<a class="btn" href="/dashboard">Go to Dashboard</a>`;

    setTimeout(() => { window.location.href = '/dashboard'; }, 2500);
  } catch {
    showError('Something went wrong. Please try again.');
  }
}

function showError(msg) {
  const icon = document.getElementById('icon');
  icon.className = 'icon-circle error';
  icon.innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  document.getElementById('title').textContent = 'Verification failed';
  document.getElementById('msg').textContent = msg;
  document.getElementById('action').innerHTML = `<a class="btn" href="/dashboard">Back to Dashboard</a>`;
}

verify();
</script>
<footer style="background:var(--surface);border-top:1px solid var(--border);padding:0.75rem 2rem;font-size:12px;color:var(--text-3);">
  &copy; 2026 CubingClubs.net &mdash; <a href="/privacy-policy" style="color:var(--brand);text-decoration:none;">Privacy Policy</a>
</footer>
</body>
</html>
