<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — CubingClubs.net</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1A56DB" />
<link rel="icon" href="/logo.png" type="image/png" />
<link rel="apple-touch-icon" href="/logo.png" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #1A56DB; --brand-dark: #1240A8; --brand-light: #EBF1FD;
    --bg: #F6F7F9; --surface: #FFFFFF; --border: #E4E7EC;
    --text: #111827; --text-2: #4B5563; --text-3: #9CA3AF;
    --danger: #DC2626; --danger-light: #FEE2E2;
    --radius: 10px; --header-h: 68px;
  }
  html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
  header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 2rem; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-img { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .logo-text span { color: var(--brand); }
  .page { max-width: 400px; margin: 6rem auto; padding: 0 1.5rem; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
  .auth-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .auth-sub { font-size: 13px; color: var(--text-3); margin-bottom: 1.5rem; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
  label { font-size: 13px; font-weight: 500; color: var(--text-2); }
  input { font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; transition: border 0.15s, box-shadow 0.15s; width: 100%; }
  input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
  .error-msg { font-size: 13px; color: var(--danger); background: var(--danger-light); padding: 8px 12px; border-radius: 8px; margin-bottom: 1rem; display: none; }
  .error-msg.visible { display: block; }
  .password-hint { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .btn-primary { display: flex; align-items: center; justify-content: center; width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 10px 16px; border-radius: 8px; border: none; background: var(--brand); color: #fff; cursor: pointer; transition: background 0.15s; }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .invalid-card { text-align: center; padding: 2rem; }
  .invalid-card p { color: var(--text-2); margin-bottom: 1rem; }
  .invalid-card a { color: var(--brand); font-weight: 500; }
</style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <img src="/logo.png" class="logo-img" alt="CubingClubs.net" />
    <span class="logo-text">CubingClubs<span>.net</span></span>
  </a>
</header>

<div class="page">
  <div class="auth-card" id="form-card">
    <div class="auth-title">Set new password</div>
    <div class="auth-sub">Choose a strong password for your account.</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="field">
      <label for="password">New Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
      <span class="password-hint">At least 8 characters</span>
    </div>
    <div class="field">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" />
    </div>
    <button class="btn-primary" id="submit-btn" onclick="doReset()">Reset Password</button>
  </div>

  <div class="auth-card invalid-card" id="invalid-card" style="display:none;">
    <p>This reset link is invalid or has expired.</p>
    <a href="/forgot-password">Request a new reset link →</a>
  </div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('form-card').style.display = 'none';
  document.getElementById('invalid-card').style.display = 'block';
}

async function doReset() {
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('error-msg');
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;

  errEl.classList.remove('visible');
  if (password.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters.';
    errEl.classList.add('visible'); return;
  }
  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match.';
    errEl.classList.add('visible'); return;
  }

  btn.disabled = true; btn.textContent = 'Resetting…';

  const res = await fetch('/api/auth/reset-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, password })
  });
  const data = await res.json();

  if (!res.ok) {
    if (res.status === 400 && data.error?.includes('expired')) {
      document.getElementById('form-card').style.display = 'none';
      document.getElementById('invalid-card').style.display = 'block';
      return;
    }
    errEl.textContent = data.error || 'Something went wrong.';
    errEl.classList.add('visible');
    btn.disabled = false; btn.textContent = 'Reset Password';
    return;
  }

  // Success — redirect to login
  btn.textContent = 'Password reset! Redirecting…';
  setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
<footer style="background:var(--surface);border-top:1px solid var(--border);padding:0.75rem 2rem;font-size:12px;color:var(--text-3);">
  &copy; 2026 CubingClubs.net &mdash; <a href="/privacy-policy" style="color:var(--brand);text-decoration:none;">Privacy Policy</a>
</footer>
</body>
</html>
